<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DJI Geo Track Viewer — Addition</title>
  <link
    href="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Widgets/widgets.css"
    rel="stylesheet"
  />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", monospace;
    }

    /* ── Layout ────────────────────────────────── */
    #app {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    /* ── Video Panel ───────────────────────────── */
    #video-panel {
      flex: 0 0 50%;
      display: flex;
      flex-direction: column;
      background: #0a0a0a;
      border-right: 2px solid #1a1a2e;
      position: relative;
      overflow: hidden;
    }

    #video-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      background: #111;
      border-bottom: 1px solid #222;
      flex-shrink: 0;
    }

    #video-header .label {
      color: #0af;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    #video-header .filename {
      color: #888;
      font-size: 11px;
    }

    #video-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      min-height: 0;
    }

    #track-video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* ── Map Panel ─────────────────────────────── */
    #map-panel {
      flex: 0 0 50%;
      position: relative;
      overflow: hidden;
    }

    #cesiumContainer {
      width: 100%;
      height: 100%;
    }

    /* ── HUD overlay ───────────────────────────── */
    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 100;
      background: rgba(0, 0, 0, 0.72);
      border: 1px solid rgba(0, 170, 255, 0.35);
      border-radius: 8px;
      padding: 10px 14px;
      color: #cce;
      font-size: 12px;
      line-height: 1.75;
      pointer-events: none;
      backdrop-filter: blur(4px);
      min-width: 190px;
    }

    #hud .hud-title {
      color: #0af;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 4px;
      border-bottom: 1px solid rgba(0,170,255,0.25);
      padding-bottom: 4px;
    }

    #hud .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    #hud .key {
      color: #0af;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    #hud .val {
      color: #eef;
      font-weight: 600;
    }

    /* ── Status bar ────────────────────────────── */
    #status-bar {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      background: rgba(0,0,0,0.75);
      border: 1px solid rgba(255,165,0,0.4);
      border-radius: 20px;
      padding: 5px 16px;
      color: #ffa500;
      font-size: 11px;
      font-weight: 600;
      pointer-events: none;
      display: none;
    }

    /* ── Camera mode toggle ────────────────────── */
    #cam-toggle {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 100;
      display: flex;
      gap: 6px;
    }

    .cam-btn {
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(0,170,255,0.4);
      border-radius: 6px;
      color: #0af;
      font-size: 11px;
      font-weight: 600;
      padding: 5px 10px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      letter-spacing: 0.5px;
    }

    .cam-btn:hover {
      background: rgba(0,170,255,0.15);
      border-color: #0af;
    }

    .cam-btn.active {
      background: rgba(0,170,255,0.25);
      border-color: #0af;
      color: #fff;
    }

    /* Hide Cesium default toolbar and credit bar; keep timeline visible */
    .cesium-viewer-toolbar       { display: none !important; }
    .cesium-viewer-bottom        { display: none !important; }
    .cesium-viewer-timelineContainer { display: block !important; }

    /* Notification banner for missing GPS */
    #gps-notice {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      background: rgba(255, 140, 0, 0.9);
      color: #000;
      font-size: 11px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 20px;
      pointer-events: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="app">

    <!-- ── Left: Video ── -->
    <div id="video-panel">
      <div id="video-header">
        <span class="label">Video</span>
        <span class="filename">Addition_fs.MP4 &nbsp;|&nbsp; 4K 29.97fps &nbsp;|&nbsp; 1:13</span>
      </div>
      <div id="video-wrapper">
        <video id="track-video" controls preload="metadata">
          <source src="Addition_fs.MP4" type="video/mp4" />
          Your browser does not support this video format.
        </video>
      </div>
    </div>

    <!-- ── Right: Cesium Map ── -->
    <div id="map-panel">
      <div id="cesiumContainer"></div>

      <!-- HUD overlay -->
      <div id="hud">
        <div class="hud-title">Flight Telemetry</div>
        <div class="row"><span class="key">T+</span><span class="val" id="hud-time">0.0 s</span></div>
        <div class="row"><span class="key">Lat</span><span class="val" id="hud-lat">—</span></div>
        <div class="row"><span class="key">Lon</span><span class="val" id="hud-lon">—</span></div>
        <div class="row"><span class="key">Alt</span><span class="val" id="hud-alt">—</span></div>
        <div class="row"><span class="key">Speed</span><span class="val" id="hud-speed">—</span></div>
        <div class="row"><span class="key">Heading</span><span class="val" id="hud-heading">—</span></div>
      </div>

      <!-- Camera mode buttons -->
      <div id="cam-toggle">
        <button class="cam-btn active" id="btn-follow" onclick="setCamMode('follow')">Follow</button>
        <button class="cam-btn" id="btn-overview" onclick="setCamMode('overview')">Overview</button>
        <button class="cam-btn" id="btn-free" onclick="setCamMode('free')">Free</button>
      </div>

      <!-- GPS notice (hidden — real GPS data loaded) -->
      <div id="gps-notice" style="display:none;"></div>

      <div id="status-bar">Syncing...</div>
    </div>

  </div>

  <script src="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Cesium.js"></script>
  <script src="app.js"></script>
</body>
</html>
